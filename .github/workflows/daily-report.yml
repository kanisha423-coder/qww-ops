name: Training Score Report

on:
  schedule:
    # Runs every hour for real-time training score updates
    - cron: '0 * * * *'
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  score-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests jinja2

      - name: Run score report
            timeout-minutes: 30
        env:
          BLAND_API_KEY: ${{ secrets.BLAND_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          QUILL_PATHWAY_ID: ${{ secrets.QUILL_PATHWAY_ID }}
          WALTER_PATHWAY_ID: ${{ secrets.WALTER_PATHWAY_ID }}
          WILLOW_PATHWAY_ID: ${{ secrets.WILLOW_PATHWAY_ID }}
          TIMEZONE: ${{ secrets.TIMEZONE }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python src/run_daily.py
